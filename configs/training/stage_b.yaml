# Stage B: Router GRPO
grpo:
  group_size: 6
  clip_eps: 0.2
  kl_coeff: 0.02
  max_rounds: 4

optimizer:
  lr: 2e-5

training:
  num_episodes: 100000
  save_every: 1000
  eval_every: 500
  log_every: 50

# Experts frozen — router only
freeze_experts: true

gate:
  team_vs_single_agent: 5  # +5% minimum improvement
  multi_expert_usage: 0.30  # >=30% of successes use >1 expert
